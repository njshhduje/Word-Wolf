<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Player</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>ワードウルフ</h1>

<input id="name" placeholder="名前">

<button onclick="join()">参加</button>

<h2 id="playerName"></h2>

<div class="word fade" id="word">待機中</div>

<div class="timer" id="timer"></div>

<div id="voteArea"></div>

<div class="result fade" id="result"></div>

<ul id="players"></ul>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

let myId = null;

function join(){

    const name = document.getElementById("name").value;

    socket.emit("join", {
        name,
        role:"player"
    });

    document.getElementById("playerName").innerText = name;
}

socket.on("connect", () => {

    myId = socket.id;
});

socket.on("players", (players) => {

    const list = document.getElementById("players");

    list.innerHTML = "";

    Object.entries(players).forEach(([id,p]) => {

        const li = document.createElement("li");

        li.innerText = p.name;

        list.appendChild(li);

        if(id !== myId){

            const btn = document.createElement("button");

            btn.innerText = p.name + " に投票";

            btn.onclick = () => {

                socket.emit("vote", id);

                document.getElementById("voteArea").innerHTML = "投票済み";
            };

            document.getElementById("voteArea").appendChild(btn);
        }
    });
});

socket.on("word", data => {

    document.getElementById("word").innerText = data.word;
});

socket.on("timer", endTime => {

    const timer = document.getElementById("timer");

    const interval = setInterval(() => {

        const remain = Math.max(
            0,
            Math.floor((endTime - Date.now()) / 1000)
        );

        timer.innerText = remain + " 秒";

        if(remain <= 0){

            clearInterval(interval);
        }

    },1000);
});

socket.on("result", result => {

    document.getElementById("result").innerText = result;
});

</script>

</body>
</html>
